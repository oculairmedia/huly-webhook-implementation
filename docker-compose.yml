name: huly-test
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
services:
  kafka:
    image: apache/kafka:3.7.0
    init: true
    hostname: kafka
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_NUM_PARTITIONS: 5
      KAFKA_LOG4J_ROOT_LOGLEVEL: ERROR
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server
          localhost:9092 || exit 1
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    logging: *default-logging
    restart: unless-stopped
  nginx:
    image: nginx:1.26.3
    depends_on:
      transactor-1:
        condition: service_started
      transactor-2:
        condition: service_started
      transactor-3:
        condition: service_started
      transactor-4:
        condition: service_started
      transactor-5:
        condition: service_started
    ports:
      - "8101:80"
    volumes:
      - ./.huly.nginx:/etc/nginx/conf.d/default.conf
    labels:
      - homepage.group=Productivity
      - homepage.name=Huly
      - homepage.icon=mdi-clipboard-check-outline
      - homepage.href=http://192.168.50.90:8101
      - homepage.description=Project management and collaboration platform
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging: *default-logging
    restart: unless-stopped
  cockroachdb:
    image: cockroachdb/cockroach:v24.2.10
    command: start-single-node --insecure --cache=2GB --max-sql-memory=2GB
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    ports:
      - 26257:26257
      - 8090:8080
    # Hardening: Memory limits prevent runaway usage and protect against OOM
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    # Hardening: Lower OOM score makes kernel less likely to kill this container
    oom_score_adj: -500
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8080/health?ready=1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --address ":9000" --console-address ":9001"
    volumes:
      - files:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:9000/minio/health/live"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1500M
        reservations:
          memory: 512M
    logging: *default-logging
    restart: unless-stopped
  elastic:
    image: elasticsearch:7.14.2
    command: >
      /bin/sh -c "./bin/elasticsearch-plugin list | grep -q ingest-attachment ||
      yes | ./bin/elasticsearch-plugin install --silent ingest-attachment;
      /usr/local/bin/docker-entrypoint.sh eswrapper"
    volumes:
      - elastic:/usr/share/elasticsearch/data
    environment:
      - ELASTICSEARCH_PORT_NUMBER=9200
      - BITNAMI_DEBUG=true
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1536m -Xmx1536m
      - http.cors.enabled=true
      - http.cors.allow-origin=http://localhost:8082
      - ingest.geoip.downloader.enabled=false
    healthcheck:
      interval: 20s
      retries: 10
      test: curl -s http://localhost:9200/_cluster/health | grep -vq '"status":"red"'
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging: *default-logging
    restart: unless-stopped
  rekoni:
    image: hardcoreeng/rekoni-service:${HULY_VERSION}
    environment:
      - SECRET=${SECRET}
      - ENABLE_CONSOLE=false
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:4004/ | grep -q '200\\|404'"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 500M
    logging: *default-logging
    restart: unless-stopped
  transactor-1:
    image: hardcoreeng/transactor:${HULY_VERSION}
    depends_on:
      kafka:
        condition: service_healthy
      cockroachdb:
        condition: service_healthy
      account:
        condition: service_healthy
    environment:
      - SERVER_PORT=3333
      - SERVER_SECRET=${SECRET}
      - SERVER_CURSOR_MAXTIMEMS=30000
      - DB_URL=postgresql://root@cockroachdb:26257/defaultdb?sslmode=disable
      - MONGO_URL=postgresql://root@cockroachdb:26257/defaultdb?sslmode=disable
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - FRONT_URL=http${SECURE:+s}://${HOST_ADDRESS}
      - ACCOUNTS_URL=http://account:3000
      - FULLTEXT_URL=http://fulltext:4700
      - STATS_URL=http://stats:4900
      - LAST_NAME_FIRST=${LAST_NAME_FIRST:-true}
      - QUEUE_CONFIG=kafka:9092
      # Reliability hardening
      - SERVER_REQUEST_TIMEOUT_MS=120000
      - DB_POOL_MAX=10
      - DB_POOL_MIN=2
      - DB_POOL_IDLE_TIMEOUT=300000
      - ENABLE_CONSOLE=false
      - HULY_EMAIL=${HULY_EMAIL:-emanuvaderland@gmail.com}
      - HULY_PASSWORD=${HULY_PASSWORD:-k2a8yy7sFWVZ6eL}
      - HULY_WORKSPACE=${HULY_WORKSPACE:-agentspace}
      - TRANSACTOR_AUTH_HEALTHCHECK_TIMEOUT_MS=5000
      - TRANSACTOR_NODE_IDENTITY=transactor-1
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "/usr/src/app/transactor-auth-healthcheck.js",
          "--candidate-url",
          "ws://localhost:3333",
        ]
      interval: 30s
      timeout: 12s
      retries: 3
      start_period: 45s
    volumes:
      - ./bundle.js.patched:/usr/src/app/bundle.js:ro
      - ./scripts/transactor-auth-healthcheck.js:/usr/src/app/transactor-auth-healthcheck.js:ro
    logging: *default-logging
    restart: unless-stopped
