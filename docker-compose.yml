      cockroachdb:
        condition: service_healthy
      account:
        condition: service_started
      stats:
        condition: service_started
    environment:
      - COLLABORATOR_PORT=3078
      - SECRET=${SECRET}
      - ACCOUNTS_URL=http://account:3000
      - DB_URL=postgresql://root@cockroachdb:26257/defaultdb?sslmode=disable
      - STATS_URL=http://stats:4900
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      # - PROCEED_V7_MONGO=true # Not needed with CockroachDB
      - ENABLE_CONSOLE=false
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3078', r => { process.exit(r.statusCode ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
