  kvs:
    image: hardcoreeng/hulykvs:${HULY_VERSION}
    depends_on:
      cockroachdb:
        condition: service_healthy
    environment:
      - HULY_DB_CONNECTION=${CR_DB_URL}
      - HULY_TOKEN_SECRET=${SECRET}
      - ENABLE_CONSOLE=false
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8094' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging: *default-logging
    restart: unless-stopped
  github:
    image: hardcoreeng/github:${HULY_VERSION}
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - PORT=3500
      - ACCOUNTS_URL=http${SECURE:+s}://${HOST_ADDRESS}/_accounts
      - SERVER_SECRET=${SECRET}
      - SERVICE_ID=github-service
      - FRONT_URL=http${SECURE:+s}://${HOST_ADDRESS}
      - APP_ID=${GITHUB_APP_ID}
      - CLIENT_ID=${GITHUB_APP_CLIENT_ID}
      - CLIENT_SECRET=${GITHUB_APP_CLIENT_SECRET}
      - PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - BOT_NAME=${GITHUB_BOT_NAME}
      - COLLABORATOR_URL=ws${SECURE:+s}://${HOST_ADDRESS}/_collaborator
      - MONGO_URL=postgresql://root@cockroachdb:26257/defaultdb?sslmode=disable
      - DB_URL=postgresql://root@cockroachdb:26257/defaultdb?sslmode=disable
      - MINIO_ENDPOINT=minio
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - ELASTIC_URL=http://elastic:9200
      - REKONI_URL=http://rekoni:4004
      - STORAGE_CONFIG=minio|minio?accessKey=minioadmin&secretKey=minioadmin
      - QUEUE_CONFIG=kafka:9092
      - ENABLE_CONSOLE=false
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3500', r => { process.exit(r.statusCode ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging: *default-logging
    restart: unless-stopped
  huly-mcp:
    image: huly-huly-mcp:latest
    volumes:
      - ./huly-mcp-server/src/transport/HttpTransport.js:/app/src/transport/HttpTransport.js:ro
    ports:
      - 3457:3000
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=error
      - HULY_URL=http://nginx
      - HULY_PUBLIC_URL=http${SECURE:+s}://${HOST_ADDRESS}
      - HULY_EMAIL=${HULY_MCP_EMAIL}
      - HULY_PASSWORD=${HULY_MCP_PASSWORD}
      - HULY_WORKSPACE=${HULY_MCP_WORKSPACE}
      - HULY_MCP_REQUEST_TIMEOUT_MS=60000
      - HULY_HTTP_KEEPALIVE_MS=120000
      - HULY_HTTP_HEADERS_TIMEOUT_MS=130000
      - HULY_HTTP_REQUEST_TIMEOUT_MS=0
      - HULY_ALLOWED_ORIGINS=*
      - HULY_TRANSACTOR_URL=ws://transactor-2:3333
      - HULY_CONNECTION_TIMEOUT_MS=60000
      # HULY_TRANSACTOR_URLS removed — Phase 0 self-healing: pin to single canonical
      # transactor to prevent split-brain routing. Raw multi-node pool will be
      # re-enabled only after health-based routing exists (Phase 2).
      # Pinned to transactor-1 until health-based routing exists.
      # See TRANSACTOR_SELF_HEALING_PRD.md
    labels:
      - homepage.group=Productivity
      - homepage.name=Huly MCP Server
      - homepage.icon=mdi-connection
      - homepage.href=http://192.168.50.90:3457
      - homepage.description=Model Context Protocol server for Huly
    depends_on:
      nginx:
        condition: service_started
      front:
        condition: service_started
      account:
        condition: service_healthy
      transactor-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => { process.exit(r.statusCode ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
  huly-rest-api:
    build: ./huly-rest-api
    image: huly-huly-rest-api:latest
    ports:
      - 3458:3458
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=300
      - PORT=3458
      - HULY_URL=http://nginx
      - HULY_TRANSACTOR_URL=ws://transactor-1:3333
      # HULY_TRANSACTOR_URLS removed — Phase 0 self-healing (see MCP service above)
      - HULY_EMAIL=${HULY_MCP_EMAIL}
      - HULY_PASSWORD=${HULY_MCP_PASSWORD}
      - HULY_WORKSPACE=${HULY_MCP_WORKSPACE}
      - LOG_LEVEL=error
    labels:
      - homepage.group=Productivity
      - homepage.name=Huly REST API
      - homepage.icon=si-swagger
      - homepage.href=http://192.168.50.90:3458
      - homepage.description=REST API for Huly platform
    volumes:
      - ./huly-rest-api/server.js:/app/server.js:ro
    depends_on:
      nginx:
        condition: service_started
      account:
        condition: service_healthy
      transactor-1:
        condition: service_healthy
      front:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3458/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
  huly-change-watcher:
    build: ./huly-change-watcher
    container_name: huly-change-watcher
    environment:
      - COCKROACH_HOST=cockroachdb
      - COCKROACH_PORT=26257
      - COCKROACH_DATABASE=defaultdb
      - COCKROACH_USER=root
      - POLL_INTERVAL=5000
      - WEBHOOK_URLS=http://192.168.50.90:3099/webhook
      - PORT=3459
      - LOG_LEVEL=error
    ports:
      - "3459:3459"
    labels:
      - homepage.group=Productivity
      - homepage.name=Huly Change Watcher
      - homepage.icon=mdi-webhook
      - homepage.href=http://192.168.50.90:3459
      - homepage.description=Database change monitoring and webhook service
    depends_on:
      cockroachdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging: *default-logging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3459/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  huly-watchdog:
    image: docker:27-cli
    environment:
      - STACK_DIR=/opt/stacks/huly-test-v07
      - AUTO_RECOVER=true
      - COMPOSE_PROJECT_NAME=huly-test
      - WATCHDOG_INTERVAL_SECONDS=60
      - TRANSACTOR_AUTH_FAILURE_THRESHOLD=2
      - TRANSACTOR_RESTART_COOLDOWN_SECONDS=300
      - TRANSACTOR_PROBE_ACCOUNTS_URL=http://account:3000
      - REST_HEALTH_URL=http://huly-rest-api:3458/health
      - MCP_HEALTH_URL=http://huly-mcp:3000/health
    depends_on:
      cockroachdb:
        condition: service_healthy
      account:
        condition: service_healthy
      huly-rest-api:
        condition: service_started
      huly-mcp:
        condition: service_started
    command:
      [
        "sh",
        "-lc",
        "apk add --no-cache bash curl grep coreutils >/dev/null && while true; do /opt/stacks/huly-test-v07/scripts/huly-watchdog.sh; sleep ${WATCHDOG_INTERVAL_SECONDS:-60}; done",
      ]
    volumes:
      - .:/opt/stacks/huly-test-v07:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    logging: *default-logging
    restart: unless-stopped
volumes:
  cockroach_data: null
  elastic: null
  files: null
  kafka_data: null
networks:
  default:
    driver: bridge
